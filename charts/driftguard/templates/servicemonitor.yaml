{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: driftguard
  namespace: {{ .Values.serviceMonitor.namespace }}
  labels:
    app: driftguard
spec:
  selector:
    matchLabels:
      app: driftguard
  namespaceSelector:
    matchNames:
      - driftguard-system
  endpoints:
    - port: metrics
      interval: {{ .Values.serviceMonitor.interval }}
      path: /metrics
{{- end }}