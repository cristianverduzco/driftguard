apiVersion: v1
kind: Service
metadata:
  name: driftguard
  namespace: driftguard-system
  labels:
    app: driftguard
spec:
  selector:
    app: driftguard
  ports:
    - name: metrics
      port: {{ .Values.metrics.port }}
      targetPort: metrics
    - name: dashboard
      port: {{ .Values.dashboard.port }}
      targetPort: dashboard