image:
  repository: driftguard
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

# Git repository to watch
git:
  url: ""
  branch: main

# Sync interval in seconds
syncInterval: 30

# Enable auto-remediation
autoRemediate: false

# Dry run mode
dryRun: false

# Slack webhook URL (set via --set or secret)
slackWebhookUrl: ""

# Metrics configuration
metrics:
  enabled: true
  port: 8080

# Resource limits
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# ServiceMonitor for Prometheus Operator
serviceMonitor:
  enabled: false
  namespace: monitoring
  interval: 30s