image:
  repository: driftguard
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

git:
  url: ""
  branch: main

syncInterval: 30
autoRemediate: false
dryRun: false
slackWebhookUrl: ""

metrics:
  enabled: true
  port: 8080

dashboard:
  enabled: true
  port: 9091

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

serviceMonitor:
  enabled: false
  namespace: monitoring
  interval: 30s